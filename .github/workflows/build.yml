name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    env:
      DisableRealDriverIO: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Restore
        run: dotnet restore Examples.sln

      - name: Build
        run: dotnet build Examples.sln --no-restore

      - name: Verify code style
        if: matrix.os == 'ubuntu-latest'
        run: dotnet format Examples.sln --exclude tests/ --verify-no-changes

      - name: Smoke Tests
        run: dotnet test tests/Examples.SmokeTests